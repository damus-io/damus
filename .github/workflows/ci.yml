name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select simulator destination
        id: simulator
        shell: bash
        run: |
          destination_id=$(xcodebuild -scheme damus -showdestinations | awk -F'id:' '/platform:iOS Simulator/ {split($2, parts, ","); gsub(/^[[:space:]]+|[[:space:]]+$/, "", parts[1]); print parts[1]; exit}')

          if [[ -z "$destination_id" ]]; then
            echo "Unable to find an available iOS Simulator destination for scheme 'damus'."
            xcodebuild -scheme damus -showdestinations
            exit 1
          fi

          echo "destination=id=$destination_id" >> "$GITHUB_OUTPUT"

      - name: Build
        run: xcodebuild -scheme damus -destination "${{ steps.simulator.outputs.destination }}" build

      - name: Test
        run: xcodebuild -scheme damus -destination "${{ steps.simulator.outputs.destination }}" test
